<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Universal TTS project banner</title>
  <desc id="desc">Abstract dark developer-tool banner with waveforms, a central Universal TTS API hub, and connected provider sidecars.</desc>
  <defs>
    <radialGradient id="g1" cx="74%" cy="31%" r="58%">
      <stop offset="0" stop-color="#2c3cff" stop-opacity="0.55"/>
      <stop offset="0.42" stop-color="#14244d" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#080a12" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="22%" cy="74%" r="52%">
      <stop offset="0" stop-color="#00e7d6" stop-opacity="0.38"/>
      <stop offset="0.55" stop-color="#0b2b40" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#080a12" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3" cx="84%" cy="77%" r="48%">
      <stop offset="0" stop-color="#ff9e42" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#080a12" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#070a13"/>
      <stop offset="0.55" stop-color="#11172c"/>
      <stop offset="1" stop-color="#090b13"/>
    </linearGradient>
    <linearGradient id="hub" x1="0" x2="1">
      <stop offset="0" stop-color="#091629"/>
      <stop offset="1" stop-color="#162a4a"/>
    </linearGradient>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0V64" fill="none" stroke="#8fb7ff" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <style>
      .title{font:700 66px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;letter-spacing:-1.5px;fill:#f5fbff}
      .subtitle{font:400 25px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#bdd4e7}
      .chip{font:500 22px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#dff7ff}
      .node{font:700 16px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#eff8ff}
      .small{font:700 19px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#d9fbff;letter-spacing:1px}
    </style>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#g1)"/>
  <rect width="1280" height="640" fill="url(#g2)"/>
  <rect width="1280" height="640" fill="url(#g3)"/>
  <rect width="1280" height="640" fill="url(#grid)" opacity="0.75"/>

  <g opacity="0.48" fill="none" stroke-linecap="round">
    <path d="M60 214 C130 176 186 250 252 214 S374 178 438 214 562 252 626 214 746 176 812 214 936 252 1000 214 1124 176 1220 214" stroke="#49e6ff" stroke-width="3"/>
    <path d="M60 250 C128 231 186 270 252 250 S374 230 438 250 562 270 626 250 746 230 812 250 936 271 1000 250 1124 229 1220 250" stroke="#b27eff" stroke-width="3"/>
    <path d="M60 410 C128 376 192 442 256 410 S376 376 442 410 564 444 628 410 746 376 814 410 936 444 1002 410 1128 376 1220 410" stroke="#ffb454" stroke-width="3"/>
    <path d="M60 445 C128 425 192 464 256 445 S376 426 442 445 564 463 628 445 746 426 814 445 936 463 1002 445 1128 426 1220 445" stroke="#5df4bc" stroke-width="3"/>
  </g>

  <g filter="url(#shadow)">
    <text class="title" x="76" y="122">Universal TTS</text>
    <text class="subtitle" x="80" y="158">One local API for realtime speech, cloning, streaming, and model sidecars</text>
  </g>

  <g opacity="0.96" filter="url(#softGlow)">
    <line x1="430" y1="225" x2="720" y2="320" stroke="#74efff" stroke-opacity="0.35" stroke-width="3"/>
    <line x1="470" y1="465" x2="720" y2="320" stroke="#ffb454" stroke-opacity="0.35" stroke-width="3"/>
    <line x1="965" y1="160" x2="720" y2="320" stroke="#b27eff" stroke-opacity="0.35" stroke-width="3"/>
    <line x1="1010" y1="455" x2="720" y2="320" stroke="#78f5b2" stroke-opacity="0.35" stroke-width="3"/>
    <line x1="325" y1="320" x2="720" y2="320" stroke="#ff69b4" stroke-opacity="0.35" stroke-width="3"/>
    <line x1="865" y1="505" x2="720" y2="320" stroke="#69a8ff" stroke-opacity="0.35" stroke-width="3"/>
    <line x1="880" y1="310" x2="720" y2="320" stroke="#ffd267" stroke-opacity="0.35" stroke-width="3"/>

    <circle cx="720" cy="320" r="164" fill="none" stroke="#74efff" stroke-opacity="0.20" stroke-width="2"/>
    <circle cx="720" cy="320" r="118" fill="none" stroke="#74efff" stroke-opacity="0.36" stroke-width="2"/>
    <circle cx="720" cy="320" r="78" fill="none" stroke="#74efff" stroke-opacity="0.58" stroke-width="2"/>
    <circle cx="720" cy="320" r="56" fill="url(#hub)" stroke="#8ef5ff" stroke-width="3"/>
    <rect x="674" y="302" width="92" height="36" rx="10" fill="#142642" stroke="#8ef5ff" stroke-opacity="0.72"/>
    <text class="small" x="690" y="327">API</text>
  </g>

  <g>
    <g transform="translate(430 225)"><rect x="-48" y="-24" width="96" height="48" rx="14" fill="#0d1426" stroke="#74efff" stroke-width="2"/><text class="node" text-anchor="middle" y="6">Qwen3</text></g>
    <g transform="translate(470 465)"><rect x="-43" y="-24" width="86" height="48" rx="14" fill="#0d1426" stroke="#ffb454" stroke-width="2"/><text class="node" text-anchor="middle" y="6">Miso</text></g>
    <g transform="translate(965 160)"><rect x="-56" y="-24" width="112" height="48" rx="14" fill="#0d1426" stroke="#b27eff" stroke-width="2"/><text class="node" text-anchor="middle" y="6">Fish S2</text></g>
    <g transform="translate(1010 455)"><rect x="-54" y="-24" width="108" height="48" rx="14" fill="#0d1426" stroke="#78f5b2" stroke-width="2"/><text class="node" text-anchor="middle" y="6">Kokoro</text></g>
    <g transform="translate(325 320)"><rect x="-50" y="-24" width="100" height="48" rx="14" fill="#0d1426" stroke="#ff69b4" stroke-width="2"/><text class="node" text-anchor="middle" y="6">Kitten</text></g>
    <g transform="translate(865 505)"><rect x="-45" y="-24" width="90" height="48" rx="14" fill="#0d1426" stroke="#69a8ff" stroke-width="2"/><text class="node" text-anchor="middle" y="6">Vibe</text></g>
    <g transform="translate(880 310)"><rect x="-68" y="-24" width="136" height="48" rx="14" fill="#0d1426" stroke="#ffd267" stroke-width="2"/><text class="node" text-anchor="middle" y="6">Chatterbox</text></g>
  </g>

  <g transform="translate(82 520)">
    <rect width="206" height="42" rx="18" fill="#101e36" stroke="#5ed3e6" stroke-opacity="0.5"/>
    <text class="chip" x="16" y="28">OpenAI-compatible</text>
    <g transform="translate(222 0)"><rect width="158" height="42" rx="18" fill="#101e36" stroke="#5ed3e6" stroke-opacity="0.5"/><text class="chip" x="16" y="28">PCM streaming</text></g>
    <g transform="translate(396 0)"><rect width="134" height="42" rx="18" fill="#101e36" stroke="#5ed3e6" stroke-opacity="0.5"/><text class="chip" x="16" y="28">Voice library</text></g>
    <g transform="translate(546 0)"><rect width="142" height="42" rx="18" fill="#101e36" stroke="#5ed3e6" stroke-opacity="0.5"/><text class="chip" x="16" y="28">Apple Silicon</text></g>
  </g>

  <rect width="1280" height="640" fill="none" stroke="#ffffff" stroke-opacity="0.06"/>
</svg>
